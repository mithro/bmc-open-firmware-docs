# Read the Docs configuration for the open BMC/firmware documentation.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: source/conf.py
  fail_on_warning: true

python:
  install:
    - requirements: requirements.txt

# PDF (latexpdf) is temporarily disabled: the Sphinx->LaTeX generation is clean,
# but the pdflatex compile has not yet been verified against a full texlive.
# Re-enable `- pdf` once a real texlive build is confirmed green.
formats:
  - htmlzip
