<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 880" role="img" aria-labelledby="p-title p-desc">
  <title id="p-title">AST2050 P2A cold-boot flow</title>
  <desc id="p-desc">Ten-step numbered flowchart of booting the AST2050 with no BMC firmware over the PCIe-to-AHB (P2A) bridge: host drives the P2A window, enables the bridge, initialises DDR2 over AHB, siphons the U-Boot/Linux payload into DRAM at 0x40000000, remaps DRAM to 0x0 (AHBC8C[0]=1), freezes the ARM with SCU70[1:0]=11, triggers a watchdog HRST_N reset, re-applies the remap, re-enables the ARM with SCU70[1:0]=10, and runs. DDR2 and SCU state survive the reset; the AHBC remap is cleared and must be re-applied.</desc>
  <style>
    text{font-family:ui-monospace,'DejaVu Sans Mono',monospace;fill:var(--ink);}
    svg{
      --ink:#1a1a1a;--muted:#555;--box:#f4f4f4;--panel:#ececec;
      --blue:#2d6cdf;--green:#1a8a5a;--gold:#b8860b;--purple:#7d3cc0;--red:#c0392b;
    }
    @media (prefers-color-scheme: dark){
      svg{
        --ink:#e6e6e6;--muted:#a8a8a8;--box:#2a2a2a;--panel:#232323;
        --blue:#5b9bff;--green:#3cc98a;--gold:#e0b050;--purple:#b98cf0;--red:#e74c3c;
      }
    }
    .t{font-size:19px;font-weight:700;}
    .st{font-size:12px;fill:var(--muted);}
    .h{font-size:13px;font-weight:700;}
    .l{font-size:12px;}
    .m{font-size:12px;fill:var(--muted);}
    .box{fill:var(--box);stroke-width:1.9;}
    .blue{stroke:var(--blue);}.green{stroke:var(--green);}.gold{stroke:var(--gold);}
    .purple{stroke:var(--purple);}.red{stroke:var(--red);}.neu{stroke:var(--ink);}
    .badge{fill:var(--box);stroke-width:1.9;}
    .nblue{fill:var(--blue);}.ngreen{fill:var(--green);}.ngold{fill:var(--gold);}.nred{fill:var(--red);}
    .wire{fill:none;stroke:var(--ink);stroke-width:1.6;}
    .dash{fill:none;stroke:var(--red);stroke-width:1.4;stroke-dasharray:5 4;}
    .fillink{fill:var(--ink);}
    .panel{fill:var(--panel);stroke:var(--red);stroke-width:1.6;}
    .sw{stroke-width:1.8;fill:var(--box);}
    .ok{fill:var(--green);font-weight:700;}
    .no{fill:var(--red);font-weight:700;}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="fillink"/>
    </marker>
  </defs>

  <text class="t" x="24" y="34">AST2050 P2A cold-boot &#8212; DRAM-at-0x0 over the PCIe&#8594;AHB bridge</text>
  <text class="st" x="24" y="54">no BMC firmware needed &#183; the host loads and launches U-Boot/Linux into DRAM</text>

  <!-- connectors between steps -->
  <line class="wire" x1="340" y1="148" x2="340" y2="164" marker-end="url(#ar)"/>
  <line class="wire" x1="340" y1="220" x2="340" y2="236" marker-end="url(#ar)"/>
  <line class="wire" x1="340" y1="292" x2="340" y2="308" marker-end="url(#ar)"/>
  <line class="wire" x1="340" y1="364" x2="340" y2="380" marker-end="url(#ar)"/>
  <line class="wire" x1="340" y1="436" x2="340" y2="452" marker-end="url(#ar)"/>
  <line class="wire" x1="340" y1="508" x2="340" y2="524" marker-end="url(#ar)"/>
  <line class="wire" x1="340" y1="580" x2="340" y2="596" marker-end="url(#ar)"/>
  <line class="wire" x1="340" y1="652" x2="340" y2="668" marker-end="url(#ar)"/>
  <line class="wire" x1="340" y1="724" x2="340" y2="740" marker-end="url(#ar)"/>

  <!-- STEP 1 -->
  <rect class="box blue" x="120" y="92" width="440" height="56" rx="9"/>
  <circle class="badge blue" cx="150" cy="120" r="15"/><text class="h nblue" x="150" y="125" text-anchor="middle">1</text>
  <text class="h" x="182" y="115">Host drives the P2A window</text>
  <text class="m" x="182" y="135">PCIe VGA function &#183; PCIS14 2nd 64 KB (MMIOBASE+0x10000)</text>

  <!-- STEP 2 -->
  <rect class="box blue" x="120" y="164" width="440" height="56" rx="9"/>
  <circle class="badge blue" cx="150" cy="192" r="15"/><text class="h nblue" x="150" y="197" text-anchor="middle">2</text>
  <text class="h" x="182" y="187">Enable the P2A bridge</text>
  <text class="m" x="182" y="207">P2A00[0]=1 &#183; P2A04[31:16] = AHB base &#8594; host cycles reach AHB</text>

  <!-- STEP 3 -->
  <rect class="box gold" x="120" y="236" width="440" height="56" rx="9"/>
  <circle class="badge gold" cx="150" cy="264" r="15"/><text class="h ngold" x="150" y="269" text-anchor="middle">3</text>
  <text class="h" x="182" y="259">DDR2 init over AHB</text>
  <text class="m" x="182" y="279">SDRAMC 0x1E6E0000 &#183; 4-bank &#183; 64 MiB &#183; DLL training</text>

  <!-- STEP 4 -->
  <rect class="box gold" x="120" y="308" width="440" height="56" rx="9"/>
  <circle class="badge gold" cx="150" cy="336" r="15"/><text class="h ngold" x="150" y="341" text-anchor="middle">4</text>
  <text class="h" x="182" y="331">Siphon payload into DRAM</text>
  <text class="m" x="182" y="351">U-Boot / Linux (+ initrd) &#8594; 0x40000000</text>

  <!-- STEP 5 -->
  <rect class="box green" x="120" y="380" width="440" height="56" rx="9"/>
  <circle class="badge green" cx="150" cy="408" r="15"/><text class="h ngreen" x="150" y="413" text-anchor="middle">5</text>
  <text class="h" x="182" y="403">Remap DRAM &#8594; 0x00000000</text>
  <text class="m" x="182" y="423">AHBC00=0xAEED1A03 (unlock) &#183; AHBC8C[0]=1</text>

  <!-- STEP 6 -->
  <rect class="box red" x="120" y="452" width="440" height="56" rx="9"/>
  <circle class="badge red" cx="150" cy="480" r="15"/><text class="h nred" x="150" y="485" text-anchor="middle">6</text>
  <text class="h" x="182" y="475">Freeze the ARM across reset</text>
  <text class="m" x="182" y="495">SCU00=0x1688A8A8 &#183; SCU70[1:0]=11 (disable ARM CPU)</text>

  <!-- STEP 7 -->
  <rect class="box red" x="120" y="524" width="440" height="56" rx="9"/>
  <circle class="badge red" cx="150" cy="552" r="15"/><text class="h nred" x="150" y="557" text-anchor="middle">7</text>
  <text class="h" x="182" y="547">Watchdog reset (HRST_N)</text>
  <text class="m" x="182" y="567">WDT fires &#183; clears the AHBC reset domain</text>

  <!-- STEP 8 -->
  <rect class="box green" x="120" y="596" width="440" height="56" rx="9"/>
  <circle class="badge green" cx="150" cy="624" r="15"/><text class="h ngreen" x="150" y="629" text-anchor="middle">8</text>
  <text class="h" x="182" y="619">Re-apply the DRAM remap</text>
  <text class="m" x="182" y="639">AHBC00 key + AHBC8C[0]=1 (remap was cleared by HRST_N)</text>

  <!-- STEP 9 -->
  <rect class="box blue" x="120" y="668" width="440" height="56" rx="9"/>
  <circle class="badge blue" cx="150" cy="696" r="15"/><text class="h nblue" x="150" y="701" text-anchor="middle">9</text>
  <text class="h" x="182" y="691">Re-enable the ARM</text>
  <text class="m" x="182" y="711">SCU70[1:0]=10 (boot &#8212; fetch from 0x0)</text>

  <!-- STEP 10 -->
  <rect class="box green" x="120" y="740" width="440" height="56" rx="9"/>
  <circle class="badge green" cx="150" cy="768" r="15"/><text class="h ngreen" x="150" y="773" text-anchor="middle">10</text>
  <text class="h" x="182" y="763">ARM runs the siphoned image</text>
  <text class="m" x="182" y="783">reset vector @0x0 = SDRAM &#8594; U-Boot / Linux</text>

  <!-- survive-reset callout for steps 6-8 -->
  <line class="dash" x1="560" y1="480" x2="592" y2="480"/>
  <line class="dash" x1="560" y1="552" x2="592" y2="552"/>
  <line class="dash" x1="560" y1="624" x2="592" y2="624"/>
  <line class="dash" x1="592" y1="470" x2="592" y2="634"/>
  <rect class="panel" x="600" y="452" width="296" height="180" rx="9"/>
  <text class="h" x="616" y="478">Across the HRST_N reset:</text>
  <text class="l" x="616" y="506"><tspan class="ok">&#10003;</tspan> DDR2 / SDRAM controller state</text>
  <text class="l" x="634" y="524">survives (re-init not needed)</text>
  <text class="l" x="616" y="550"><tspan class="ok">&#10003;</tspan> SCU (SCU70 ARM-freeze) survives</text>
  <text class="l" x="634" y="568">&#8212; SCU is PWRSTN-only</text>
  <text class="l" x="616" y="594"><tspan class="no">&#10007;</tspan> AHBC remap (AHBC8C[0]) is</text>
  <text class="l" x="634" y="612">CLEARED &#8212; in HRST_N domain,</text>
  <text class="l" x="634" y="630">so re-apply at step 8</text>

  <!-- Legend -->
  <line class="wire" x1="24" y1="822" x2="896" y2="822" stroke-width="1"/>
  <rect class="sw blue"  x="24"  y="838" width="18" height="14" rx="3"/><text class="l" x="48"  y="850">host / P2A / ARM-enable</text>
  <rect class="sw gold"  x="250" y="838" width="18" height="14" rx="3"/><text class="l" x="274" y="850">DRAM init + payload</text>
  <rect class="sw green" x="452" y="838" width="18" height="14" rx="3"/><text class="l" x="476" y="850">AHBC remap / run</text>
  <rect class="sw red"   x="640" y="838" width="18" height="14" rx="3"/><text class="l" x="664" y="850">ARM freeze + WDT reset</text>
</svg>
