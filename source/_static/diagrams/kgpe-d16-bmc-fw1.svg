<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-labelledby="fw-title fw-desc" preserveAspectRatio="xMidYMid meet">
  <title id="fw-title">BMC_FW1 - ASMB4/5 iKVM module slot (KGPE-D16)</title>
  <desc id="fw-desc">Placeholder pinout for the BMC_FW1 header on the ASUS KGPE-D16, the ASMB4/5 iKVM server-management module slot. It is a two-row header with pin 1 at the lower-left (shown as a red square pad); the remaining pins are drawn as generic pads because ASUS publishes no per-pin signal map - the signals are proprietary to the ASMB4 module. Its rumored role as a BMC SPI-flash recovery path is unconfirmed.</desc>
  <style>
    text{font-family:ui-monospace,'DejaVu Sans Mono',monospace;fill:var(--ink);}
    svg{
      --ink:#1a1a1a;--muted:#555;--box:#f4f4f4;--panel:#ececec;
      --blue:#2d6cdf;--green:#1a8a5a;--gold:#b8860b;--purple:#7d3cc0;--red:#c0392b;
    }
    @media (prefers-color-scheme: dark){
      svg{
        --ink:#e6e6e6;--muted:#a8a8a8;--box:#2a2a2a;--panel:#232323;
        --blue:#5b9bff;--green:#3cc98a;--gold:#e0b050;--purple:#b98cf0;--red:#e74c3c;
      }
    }
    .t{font-size:19px;font-weight:700;}
    .st{font-size:12px;fill:var(--muted);}
    .leg{font-size:12px;}
    .m{font-size:12px;fill:var(--muted);}
    .cred{fill:var(--red);font-weight:700;}
    .board{fill:var(--panel);stroke:var(--ink);stroke-width:2;}
    .pad{fill:var(--box);stroke:var(--ink);stroke-width:2;}
    .pin1{fill:var(--box);stroke:var(--red);stroke-width:2.6;}
    .banner{fill:var(--panel);stroke:var(--gold);stroke-width:1.5;}
  </style>

  <text class="t" x="24" y="34">BMC_FW1 &#8212; ASMB4/5 iKVM module slot</text>
  <text class="st" x="24" y="57">2-row header &#183; pin 1 at lower-left &#183; per-pin signals proprietary (unpublished)</text>

  <rect class="banner" x="24" y="72" width="652" height="46" rx="6"/>
  <text class="leg cred" x="36" y="92">Signals PROPRIETARY (ASMB4) &#8212; no per-pin map published.</text>
  <text class="m" x="36" y="110">Rumored BMC-SPI-flash recovery path is UNCONFIRMED (see page notes).</text>

  <!-- header body -->
  <rect class="board" x="120" y="148" width="440" height="88" rx="10"/>

  <!-- top row -->
  <circle class="pad" cx="160" cy="176" r="9"/>
  <circle class="pad" cx="205" cy="176" r="9"/>
  <circle class="pad" cx="250" cy="176" r="9"/>
  <circle class="pad" cx="295" cy="176" r="9"/>
  <circle class="pad" cx="340" cy="176" r="9"/>
  <circle class="pad" cx="385" cy="176" r="9"/>
  <circle class="pad" cx="430" cy="176" r="9"/>
  <circle class="pad" cx="475" cy="176" r="9"/>
  <text class="m" x="512" y="181">&#183; &#183; &#183;</text>

  <!-- bottom row (pin 1 = square, lower-left) -->
  <rect class="pin1" x="150" y="199" width="20" height="20" rx="3"/>
  <text class="cred" x="160" y="209" text-anchor="middle" dominant-baseline="central" font-size="12">1</text>
  <circle class="pad" cx="205" cy="209" r="9"/>
  <circle class="pad" cx="250" cy="209" r="9"/>
  <circle class="pad" cx="295" cy="209" r="9"/>
  <circle class="pad" cx="340" cy="209" r="9"/>
  <circle class="pad" cx="385" cy="209" r="9"/>
  <circle class="pad" cx="430" cy="209" r="9"/>
  <circle class="pad" cx="475" cy="209" r="9"/>
  <text class="m" x="512" y="214">&#183; &#183; &#183;</text>

  <!-- legend -->
  <rect class="pin1" x="24" y="258" width="16" height="16" rx="2"/>
  <text class="leg" x="48" y="270">Pin 1 &#8212; lower-left (square pad)</text>
  <text class="m" x="300" y="270">&#183; &#183; &#183; = pin count / signals not published</text>
</svg>
