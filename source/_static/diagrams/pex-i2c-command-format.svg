<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="px-title px-desc" preserveAspectRatio="xMidYMid meet">
  <title id="px-title">PLX PEX8696/PEX8647 4-byte I2C command format</title>
  <desc id="px-desc">Byte-level layout of the PLX PEX8696/PEX8647 4-byte I2C command header and the I2C transactions built from it. The header is four bytes: byte[0] is the command (0x03 write, 0x04 read); byte[1] is the station/port selector ((station&lt;&lt;1)|(port&gt;&gt;1), bit0=0); byte[2] holds bit7 = low bit of port, bits5:2 = byte-enable mask, bits1:0 = register DWORD index bits [9:8]; byte[3] is register DWORD index bits [7:0]. The DWORD index equals ((byte[2] &amp; 0x03) &lt;&lt; 8) | byte[3] and the byte address is index times four; data values are 32-bit little-endian. A write is one I2C frame of eight bytes on the wire (START, address+W, the four command bytes, four data bytes, STOP). A read writes the four command bytes, issues a repeated START, then reads four data bytes back before STOP.</desc>
  <style>
    text{font-family:ui-monospace,'DejaVu Sans Mono',monospace;fill:var(--ink);}
    svg{
      --ink:#1a1a1a;--muted:#555;--box:#f4f4f4;--panel:#ececec;
      --blue:#2d6cdf;--green:#1a8a5a;--gold:#b8860b;--purple:#7d3cc0;--red:#c0392b;
    }
    @media (prefers-color-scheme: dark){
      svg{
        --ink:#e6e6e6;--muted:#a8a8a8;--box:#2a2a2a;--panel:#232323;
        --blue:#5b9bff;--green:#3cc98a;--gold:#e0b050;--purple:#b98cf0;--red:#e74c3c;
      }
    }
    .t{font-size:19px;font-weight:700;}
    .st{font-size:12px;fill:var(--muted);}
    .h{font-size:13px;font-weight:700;}
    .l{font-size:12px;}
    .m{font-size:12px;fill:var(--muted);}
    .bidx{font-size:12px;font-weight:700;fill:var(--muted);}
    .cell{font-size:12px;}
    .box{fill:var(--box);stroke-width:1.8;}
    .blue{stroke:var(--blue);}.green{stroke:var(--green);}.gold{stroke:var(--gold);}
    .purple{stroke:var(--purple);}.red{stroke:var(--red);}.neu{stroke:var(--ink);}
    .panel{fill:var(--panel);stroke:var(--muted);stroke-width:1.2;}
    .sw{stroke-width:1.8;fill:var(--box);}
  </style>

  <text class="t" x="24" y="34">PLX PEX8696 / PEX8647 &#8212; 4-byte I2C command format</text>
  <text class="st" x="24" y="54">every config access is a 4-byte command header; write = 8 bytes on the wire, read = write-then-repeated-START</text>

  <!-- Section 1: command header bytes -->
  <text class="h" x="24" y="86">4-byte command header</text>

  <text class="bidx" x="134" y="102" text-anchor="middle">byte[0]</text>
  <rect class="box blue" x="24" y="108" width="220" height="52" rx="8"/>
  <text class="h" x="134" y="139" text-anchor="middle">Command</text>
  <text class="m" x="24" y="178">0x03 = write</text>
  <text class="m" x="24" y="196">0x04 = read</text>

  <text class="bidx" x="378" y="102" text-anchor="middle">byte[1]</text>
  <rect class="box blue" x="268" y="108" width="220" height="52" rx="8"/>
  <text class="h" x="378" y="139" text-anchor="middle">Station / port</text>
  <text class="m" x="268" y="178">(station&#160;&lt;&lt;&#160;1) | (port&#160;&gt;&gt;&#160;1)</text>
  <text class="m" x="268" y="196">bit 0 = 0</text>

  <text class="bidx" x="622" y="102" text-anchor="middle">byte[2]</text>
  <rect class="box blue" x="512" y="108" width="220" height="52" rx="8"/>
  <text class="h" x="622" y="139" text-anchor="middle">Enables + reg-hi</text>
  <text class="m" x="512" y="178">bit 7 = port &amp; 1</text>
  <text class="m" x="512" y="196">bits 5:2 = byte-enables</text>
  <text class="m" x="512" y="214">bits 1:0 = reg[9:8]</text>

  <text class="bidx" x="866" y="102" text-anchor="middle">byte[3]</text>
  <rect class="box blue" x="756" y="108" width="220" height="52" rx="8"/>
  <text class="h" x="866" y="139" text-anchor="middle">reg-lo</text>
  <text class="m" x="756" y="178">register DWORD</text>
  <text class="m" x="756" y="196">index bits [7:0]</text>

  <!-- note panel -->
  <rect class="panel" x="24" y="230" width="952" height="52" rx="8"/>
  <text class="l" x="40" y="253">DWORD index = ((byte[2] &amp; 0x03) &lt;&lt; 8) | byte[3] &#160;&#183;&#160; byte address = index &#215; 4</text>
  <text class="m" x="40" y="272">data values are 32-bit little-endian: v0 = bits[7:0], v1 = [15:8], v2 = [23:16], v3 = [31:24]</text>

  <!-- Section 2: on the wire -->
  <text class="h" x="24" y="318">On the I2C wire</text>

  <!-- Write frame -->
  <text class="m" x="24" y="344">Write &#8212; 8 bytes on the wire (4 command + 4 data), single frame</text>
  <rect class="box gold"  x="24"  y="356" width="84" height="40" rx="5"/><text class="cell" x="66"  y="376" text-anchor="middle" dominant-baseline="central">START</text>
  <rect class="box gold"  x="110" y="356" width="84" height="40" rx="5"/><text class="cell" x="152" y="376" text-anchor="middle" dominant-baseline="central">addr+W</text>
  <rect class="box blue"  x="196" y="356" width="84" height="40" rx="5"/><text class="cell" x="238" y="376" text-anchor="middle" dominant-baseline="central">03</text>
  <rect class="box blue"  x="282" y="356" width="84" height="40" rx="5"/><text class="cell" x="324" y="376" text-anchor="middle" dominant-baseline="central">stn_port</text>
  <rect class="box blue"  x="368" y="356" width="84" height="40" rx="5"/><text class="cell" x="410" y="376" text-anchor="middle" dominant-baseline="central">enables</text>
  <rect class="box blue"  x="454" y="356" width="84" height="40" rx="5"/><text class="cell" x="496" y="376" text-anchor="middle" dominant-baseline="central">reg_lo</text>
  <rect class="box green" x="540" y="356" width="84" height="40" rx="5"/><text class="cell" x="582" y="376" text-anchor="middle" dominant-baseline="central">v0</text>
  <rect class="box green" x="626" y="356" width="84" height="40" rx="5"/><text class="cell" x="668" y="376" text-anchor="middle" dominant-baseline="central">v1</text>
  <rect class="box green" x="712" y="356" width="84" height="40" rx="5"/><text class="cell" x="754" y="376" text-anchor="middle" dominant-baseline="central">v2</text>
  <rect class="box green" x="798" y="356" width="84" height="40" rx="5"/><text class="cell" x="840" y="376" text-anchor="middle" dominant-baseline="central">v3</text>
  <rect class="box gold"  x="884" y="356" width="84" height="40" rx="5"/><text class="cell" x="926" y="376" text-anchor="middle" dominant-baseline="central">STOP</text>

  <!-- Read frame -->
  <text class="m" x="24" y="436">Read &#8212; write the command, repeated START, then read 4 data bytes back</text>
  <rect class="box gold" x="24"  y="448" width="71" height="40" rx="5"/><text class="cell" x="59"  y="468" text-anchor="middle" dominant-baseline="central">START</text>
  <rect class="box gold" x="97"  y="448" width="71" height="40" rx="5"/><text class="cell" x="132" y="468" text-anchor="middle" dominant-baseline="central">addr+W</text>
  <rect class="box blue" x="170" y="448" width="71" height="40" rx="5"/><text class="cell" x="205" y="468" text-anchor="middle" dominant-baseline="central">04</text>
  <rect class="box blue" x="243" y="448" width="71" height="40" rx="5"/><text class="cell" x="278" y="468" text-anchor="middle" dominant-baseline="central">stn_port</text>
  <rect class="box blue" x="316" y="448" width="71" height="40" rx="5"/><text class="cell" x="351" y="468" text-anchor="middle" dominant-baseline="central">enables</text>
  <rect class="box blue" x="389" y="448" width="71" height="40" rx="5"/><text class="cell" x="424" y="468" text-anchor="middle" dominant-baseline="central">reg_lo</text>
  <rect class="box red"  x="462" y="448" width="71" height="40" rx="5"/><text class="cell" x="497" y="468" text-anchor="middle" dominant-baseline="central">Sr</text>
  <rect class="box gold" x="535" y="448" width="71" height="40" rx="5"/><text class="cell" x="570" y="468" text-anchor="middle" dominant-baseline="central">addr+R</text>
  <rect class="box green" x="608" y="448" width="71" height="40" rx="5"/><text class="cell" x="643" y="468" text-anchor="middle" dominant-baseline="central">v0</text>
  <rect class="box green" x="681" y="448" width="71" height="40" rx="5"/><text class="cell" x="716" y="468" text-anchor="middle" dominant-baseline="central">v1</text>
  <rect class="box green" x="754" y="448" width="71" height="40" rx="5"/><text class="cell" x="789" y="468" text-anchor="middle" dominant-baseline="central">v2</text>
  <rect class="box green" x="827" y="448" width="71" height="40" rx="5"/><text class="cell" x="862" y="468" text-anchor="middle" dominant-baseline="central">v3</text>
  <rect class="box gold" x="900" y="448" width="71" height="40" rx="5"/><text class="cell" x="935" y="468" text-anchor="middle" dominant-baseline="central">STOP</text>

  <!-- legend -->
  <line x1="24" y1="510" x2="976" y2="510" stroke="var(--muted)" stroke-width="1"/>
  <rect class="sw gold"  x="24"  y="524" width="18" height="14" rx="3"/><text class="l" x="48"  y="536">START / STOP / address</text>
  <rect class="sw red"   x="256" y="524" width="18" height="14" rx="3"/><text class="l" x="280" y="536">repeated START (Sr)</text>
  <rect class="sw blue"  x="480" y="524" width="18" height="14" rx="3"/><text class="l" x="504" y="536">command bytes</text>
  <rect class="sw green" x="672" y="524" width="18" height="14" rx="3"/><text class="l" x="696" y="536">data bytes (32-bit LE)</text>
</svg>
