<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 594 346" role="img" aria-label="BMC I2C5 — board inventory + DIMM error LEDs" preserveAspectRatio="xMidYMid meet">
  <title>BMC I2C5 — board inventory + DIMM error LEDs</title>
  <style>
    text{font-family:ui-monospace,'DejaVu Sans Mono',monospace;fill:var(--ink);}
    svg{--ink:#1a1a1a;--muted:#555;--box:#f4f4f4;--panel:#ececec;
        --blue:#2d6cdf;--green:#1a8a5a;--gold:#b8860b;--purple:#7d3cc0;--red:#c0392b;}
    @media (prefers-color-scheme: dark){
      svg{--ink:#e6e6e6;--muted:#a8a8a8;--box:#2a2a2a;--panel:#232323;
          --blue:#5b9bff;--green:#3cc98a;--gold:#e0b050;--purple:#b98cf0;--red:#e74c3c;}
    }
    .t{font-size:18px;font-weight:700;}
    .st{font-size:12px;fill:var(--muted);}
    .h{font-size:13px;font-weight:700;}
    .m{font-size:11.5px;fill:var(--muted);}
    .l{font-size:12px;}
    .box{fill:var(--box);stroke-width:1.8;}
    .wire{fill:none;stroke:var(--ink);stroke-width:1.4;}
    .fillink{fill:var(--ink);}
    .sw{stroke-width:1.8;fill:var(--box);}
  </style>
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="fillink"/>
    </marker>
  </defs>
<text class="t" x="24" y="34">BMC I2C5 — board inventory + DIMM error LEDs</text>
<text class="st" x="24" y="56">AST2050 QU1 A13/B13</text>
<line class="wire" x1="204" y1="202" x2="250" y2="133" marker-end="url(#arw)"/>
<line class="wire" x1="204" y1="202" x2="250" y2="202" marker-end="url(#arw)"/>
<line class="wire" x1="204" y1="202" x2="250" y2="271" marker-end="url(#arw)"/>
<rect class="box" stroke="var(--ink)" x="24" y="179" width="180" height="46" rx="8"/>
<text class="h" x="36" y="198">AST2050 BMC</text>
<text class="m" x="36" y="215">I2C5 · A13/B13</text>
<rect class="box" stroke="var(--ink)" x="250" y="110" width="320" height="46" rx="8"/>
<text class="h" x="262" y="129">HT24LC08 EEPROM · 0x50</text>
<text class="m" x="262" y="146">board FRU (U25)</text>
<rect class="box" stroke="var(--purple)" x="250" y="179" width="320" height="46" rx="8"/>
<text class="h" x="262" y="198">W83601G · U27</text>
<text class="m" x="262" y="215">DIMM A–F error LEDs (strap addr)</text>
<rect class="box" stroke="var(--purple)" x="250" y="248" width="320" height="46" rx="8"/>
<text class="h" x="262" y="267">W83601G · U28</text>
<text class="m" x="262" y="284">DIMM G/H error LEDs (strap addr)</text>
<line class="wire" x1="24" y1="304" x2="570" y2="304"/>
<rect class="sw" stroke="var(--ink)" x="24" y="309" width="16" height="13" rx="3"/>
<text class="l" x="46" y="320">master (I2C controller)</text>
<rect class="sw" stroke="var(--purple)" x="229.6" y="309" width="16" height="13" rx="3"/>
<text class="l" x="251.6" y="320">GPIO expander</text>
<rect class="sw" stroke="var(--ink)" x="363.20000000000005" y="309" width="16" height="13" rx="3"/>
<text class="l" x="385.20000000000005" y="320">EEPROM / host / PSU</text>
</svg>
