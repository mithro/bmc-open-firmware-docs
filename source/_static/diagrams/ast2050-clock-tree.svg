<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="ck-title ck-desc" preserveAspectRatio="xMidYMid meet">
  <title id="ck-title">AST2050 clock tree</title>
  <desc id="ck-desc">Clock distribution for the Aspeed AST2050, rooted at the external 24 MHz crystal on the CLKIN pad (R22, CLK24M). Three on-chip PLLs and a set of integer dividers derive every domain: H-PLL (SCU24) feeds CPUCLK, HCLK, PCLK and UARTCLK; M-PLL (SCU20) feeds MCLK, ECLK, YCLK and GCLK, with ECLK/MCLK source-selectable to H-PLL via SCU08; V-PLL1 (dclk_pll) feeds DCLK and V1CLK; V-PLL2 (dclk2_pll) feeds video port B; integer division of the 24 MHz reference gives CLK12M, CLK1M, CLK32K, PECICLK, PWMCLK and TACHCLK; the USB2.0 PHY PLL gives UtmiCLK then USB2CLK; and external pins provide BCLK (33 MHz PCI), LCLK (33 MHz LPC) and the MII/RMII reference clocks.</desc>
  <style>
    text{font-family:ui-monospace,'DejaVu Sans Mono',monospace;fill:var(--ink);}
    svg{
      --ink:#1a1a1a;--muted:#555;--box:#f4f4f4;--panel:#ececec;
      --blue:#2d6cdf;--green:#1a8a5a;--gold:#b8860b;--purple:#7d3cc0;--red:#c0392b;
    }
    @media (prefers-color-scheme: dark){
      svg{
        --ink:#e6e6e6;--muted:#a8a8a8;--box:#2a2a2a;--panel:#232323;
        --blue:#5b9bff;--green:#3cc98a;--gold:#e0b050;--purple:#b98cf0;--red:#e74c3c;
      }
    }
    .t{font-size:19px;font-weight:700;}
    .st{font-size:12px;fill:var(--muted);}
    .h{font-size:13px;font-weight:700;}
    .l{font-size:12px;}
    .m{font-size:12px;fill:var(--muted);}
    .box{fill:var(--box);stroke-width:1.8;}
    .blue{stroke:var(--blue);}.green{stroke:var(--green);}.gold{stroke:var(--gold);}
    .purple{stroke:var(--purple);}.neu{stroke:var(--ink);}
    .wire{fill:none;stroke:var(--ink);stroke-width:1.4;}
    .fillink{fill:var(--ink);}
    .sw{stroke-width:1.8;fill:var(--box);}
    .cblue{fill:var(--blue);}.cgreen{fill:var(--green);}.cgold{fill:var(--gold);}.cpurple{fill:var(--purple);}
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="fillink"/>
    </marker>
  </defs>

  <text class="t" x="24" y="34">AST2050 clock tree &#8212; 24 MHz reference, PLLs and derived domains</text>
  <text class="st" x="24" y="54">rooted at 24 MHz CLKIN (R22) &#183; H-PLL / M-PLL / video PLLs + integer dividers &#183; not to scale</text>

  <!-- source -->
  <rect class="box neu" x="24" y="254" width="176" height="76" rx="10"/>
  <text class="h" x="112" y="284" text-anchor="middle">24 MHz crystal</text>
  <text class="m" x="112" y="303" text-anchor="middle">CLKIN pad (R22)</text>
  <text class="m" x="112" y="321" text-anchor="middle">&#8594; CLK24M</text>

  <!-- trunk + source link -->
  <line class="wire" x1="200" y1="292" x2="240" y2="292"/>
  <line class="wire" x1="240" y1="104" x2="240" y2="480"/>

  <!-- row 1: H-PLL -->
  <line class="wire" x1="240" y1="104" x2="270" y2="104" marker-end="url(#ar)"/>
  <rect class="box blue" x="270" y="84" width="200" height="40" rx="8"/>
  <text class="h" x="370" y="109" text-anchor="middle">H-PLL (SCU24)</text>
  <line class="wire" x1="470" y1="104" x2="486" y2="104" marker-end="url(#ar)"/>
  <text class="l cblue" x="494" y="108">CPUCLK &#183; HCLK &#183; PCLK &#183; UARTCLK</text>

  <!-- row 2: M-PLL -->
  <line class="wire" x1="240" y1="166" x2="270" y2="166" marker-end="url(#ar)"/>
  <rect class="box gold" x="270" y="146" width="200" height="40" rx="8"/>
  <text class="h" x="370" y="171" text-anchor="middle">M-PLL (SCU20)</text>
  <line class="wire" x1="470" y1="166" x2="486" y2="166" marker-end="url(#ar)"/>
  <text class="l cgold" x="494" y="162">MCLK &#183; ECLK &#183; YCLK &#183; GCLK</text>
  <text class="m" x="494" y="180">ECLK/MCLK selectable to H-PLL (SCU08)</text>

  <!-- row 3: V-PLL1 -->
  <line class="wire" x1="240" y1="228" x2="270" y2="228" marker-end="url(#ar)"/>
  <rect class="box purple" x="270" y="208" width="200" height="40" rx="8"/>
  <text class="h" x="370" y="233" text-anchor="middle">V-PLL1 (dclk_pll)</text>
  <line class="wire" x1="470" y1="228" x2="486" y2="228" marker-end="url(#ar)"/>
  <text class="l cpurple" x="494" y="232">DCLK &#183; V1CLK</text>

  <!-- row 4: V-PLL2 -->
  <line class="wire" x1="240" y1="290" x2="270" y2="290" marker-end="url(#ar)"/>
  <rect class="box purple" x="270" y="270" width="200" height="40" rx="8"/>
  <text class="h" x="370" y="295" text-anchor="middle">V-PLL2 (dclk2_pll)</text>
  <line class="wire" x1="470" y1="290" x2="486" y2="290" marker-end="url(#ar)"/>
  <text class="l cpurple" x="494" y="294">video port B</text>

  <!-- row 5: integer dividers -->
  <line class="wire" x1="240" y1="356" x2="270" y2="356" marker-end="url(#ar)"/>
  <rect class="box green" x="270" y="336" width="200" height="40" rx="8"/>
  <text class="h" x="370" y="361" text-anchor="middle">&#247; integer (of 24 MHz)</text>
  <line class="wire" x1="470" y1="356" x2="486" y2="356" marker-end="url(#ar)"/>
  <text class="l cgreen" x="494" y="351">CLK12M &#183; CLK1M &#183; CLK32K</text>
  <text class="m" x="494" y="369">PECICLK &#183; PWMCLK &#183; TACHCLK</text>

  <!-- row 6: USB PHY -->
  <line class="wire" x1="240" y1="424" x2="270" y2="424" marker-end="url(#ar)"/>
  <rect class="box blue" x="270" y="404" width="200" height="40" rx="8"/>
  <text class="h" x="370" y="429" text-anchor="middle">USB2.0 PHY PLL</text>
  <line class="wire" x1="470" y1="424" x2="486" y2="424" marker-end="url(#ar)"/>
  <text class="l cblue" x="494" y="428">UtmiCLK &#8594; USB2CLK</text>

  <!-- row 7: external pins -->
  <line class="wire" x1="240" y1="480" x2="270" y2="480" marker-end="url(#ar)"/>
  <rect class="box neu" x="270" y="460" width="200" height="40" rx="8"/>
  <text class="h" x="370" y="485" text-anchor="middle">external clock pins</text>
  <line class="wire" x1="470" y1="480" x2="486" y2="480" marker-end="url(#ar)"/>
  <text class="l" x="494" y="475">BCLK 33 MHz (PCI) &#183; LCLK 33 MHz (LPC)</text>
  <text class="m" x="494" y="493">MII / RMII refclks</text>

  <!-- legend -->
  <line class="wire" x1="24" y1="522" x2="956" y2="522" stroke-width="1"/>
  <rect class="sw blue"   x="24"  y="536" width="18" height="14" rx="3"/><text class="l" x="48"  y="548">H-PLL / USB</text>
  <rect class="sw gold"   x="176" y="536" width="18" height="14" rx="3"/><text class="l" x="200" y="548">M-PLL (memory)</text>
  <rect class="sw purple" x="348" y="536" width="18" height="14" rx="3"/><text class="l" x="372" y="548">video PLLs</text>
  <rect class="sw green"  x="484" y="536" width="18" height="14" rx="3"/><text class="l" x="508" y="548">integer dividers</text>
  <rect class="sw neu"    x="648" y="536" width="18" height="14" rx="3"/><text class="l" x="672" y="548">source / external</text>
</svg>
