<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="VGA1 — VGA output (HD-15)" preserveAspectRatio="xMidYMid meet">
  <title>VGA1 — VGA output (HD-15)</title>
  <style>
    text{font-family:ui-monospace,'DejaVu Sans Mono',monospace;fill:var(--ink);}
    svg{--ink:#1a1a1a;--muted:#666;--box:#f4f4f4;--panel:#ececec;
        --blue:#2d6cdf;--green:#1a8a5a;--gold:#b8860b;--purple:#7d3cc0;--red:#c0392b;}
    @media (prefers-color-scheme: dark){
      svg{--ink:#e6e6e6;--muted:#a8a8a8;--box:#2a2a2a;--panel:#232323;
          --blue:#5b9bff;--green:#3cc98a;--gold:#e0b050;--purple:#b98cf0;--red:#e74c3c;}
    }
    .t{font-size:19px;font-weight:700;}
    .st{font-size:12px;fill:var(--muted);}
    .sig{font-size:12.5px;font-weight:600;}
    .m{font-size:11px;fill:var(--muted);}
    .pn{font-size:11px;font-weight:700;}
    .leg{font-size:12px;}
    .board{fill:var(--panel);stroke:var(--ink);stroke-width:2;}
  </style>
<text class="t" x="24" y="34">VGA1 — VGA output (HD-15)</text>
<text class="st" x="24" y="55">AST2050 integrated video · RGB DAC + DDC I²C + H/V sync</text>
<path class="board" d="M 150 120 L 520 120 L 500 250 L 170 250 Z"/>
<rect x="190" y="137" width="26" height="26" rx="3" fill="var(--box)" stroke="var(--red)" stroke-width="2.8"/><text class="pn" x="203" y="150" text-anchor="middle" dominant-baseline="central" fill="var(--red)">1</text>
<circle cx="277" cy="150" r="11" fill="var(--box)" stroke="var(--blue)" stroke-width="2.4"/><text class="pn" x="277" y="150" text-anchor="middle" dominant-baseline="central" fill="var(--blue)">2</text>
<circle cx="351" cy="150" r="11" fill="var(--box)" stroke="var(--blue)" stroke-width="2.4"/><text class="pn" x="351" y="150" text-anchor="middle" dominant-baseline="central" fill="var(--blue)">3</text>
<circle cx="425" cy="150" r="11" fill="var(--box)" stroke="var(--muted)" stroke-width="2.4"/><text class="pn" x="425" y="150" text-anchor="middle" dominant-baseline="central" fill="var(--muted)">4</text>
<circle cx="499" cy="150" r="11" fill="var(--box)" stroke="var(--muted)" stroke-width="2.4"/><text class="pn" x="499" y="150" text-anchor="middle" dominant-baseline="central" fill="var(--muted)">5</text>
<circle cx="199" cy="178" r="11" fill="var(--box)" stroke="var(--muted)" stroke-width="2.4"/><text class="pn" x="199" y="178" text-anchor="middle" dominant-baseline="central" fill="var(--muted)">6</text>
<circle cx="273" cy="178" r="11" fill="var(--box)" stroke="var(--muted)" stroke-width="2.4"/><text class="pn" x="273" y="178" text-anchor="middle" dominant-baseline="central" fill="var(--muted)">7</text>
<circle cx="347" cy="178" r="11" fill="var(--box)" stroke="var(--muted)" stroke-width="2.4"/><text class="pn" x="347" y="178" text-anchor="middle" dominant-baseline="central" fill="var(--muted)">8</text>
<circle cx="421" cy="178" r="11" fill="var(--box)" stroke="var(--green)" stroke-width="2.4"/><text class="pn" x="421" y="178" text-anchor="middle" dominant-baseline="central" fill="var(--green)">9</text>
<circle cx="495" cy="178" r="11" fill="var(--box)" stroke="var(--muted)" stroke-width="2.4"/><text class="pn" x="495" y="178" text-anchor="middle" dominant-baseline="central" fill="var(--muted)">10</text>
<circle cx="195" cy="206" r="11" fill="var(--box)" stroke="var(--muted)" stroke-width="2.4"/><text class="pn" x="195" y="206" text-anchor="middle" dominant-baseline="central" fill="var(--muted)">11</text>
<circle cx="269" cy="206" r="11" fill="var(--box)" stroke="var(--blue)" stroke-width="2.4"/><text class="pn" x="269" y="206" text-anchor="middle" dominant-baseline="central" fill="var(--blue)">12</text>
<circle cx="343" cy="206" r="11" fill="var(--box)" stroke="var(--blue)" stroke-width="2.4"/><text class="pn" x="343" y="206" text-anchor="middle" dominant-baseline="central" fill="var(--blue)">13</text>
<circle cx="417" cy="206" r="11" fill="var(--box)" stroke="var(--blue)" stroke-width="2.4"/><text class="pn" x="417" y="206" text-anchor="middle" dominant-baseline="central" fill="var(--blue)">14</text>
<circle cx="491" cy="206" r="11" fill="var(--box)" stroke="var(--blue)" stroke-width="2.4"/><text class="pn" x="491" y="206" text-anchor="middle" dominant-baseline="central" fill="var(--blue)">15</text>
<text class="m" x="24" y="292"><tspan fill="var(--blue)" font-weight="700"> 1 RED</tspan> BMC E1</text>
<text class="m" x="240" y="292"><tspan fill="var(--blue)" font-weight="700"> 2 GREEN</tspan> BMC D1</text>
<text class="m" x="456" y="292"><tspan fill="var(--blue)" font-weight="700"> 3 BLUE</tspan> BMC C1</text>
<text class="m" x="24" y="307"><tspan fill="var(--muted)" font-weight="700"> 4 NC</tspan> ID2</text>
<text class="m" x="240" y="307"><tspan fill="var(--muted)" font-weight="700"> 5 GND</tspan> </text>
<text class="m" x="456" y="307"><tspan fill="var(--muted)" font-weight="700"> 6 R-GND</tspan> </text>
<text class="m" x="24" y="322"><tspan fill="var(--muted)" font-weight="700"> 7 G-GND</tspan> </text>
<text class="m" x="240" y="322"><tspan fill="var(--muted)" font-weight="700"> 8 B-GND</tspan> </text>
<text class="m" x="456" y="322"><tspan fill="var(--green)" font-weight="700"> 9 +5V</tspan> DDC pwr</text>
<text class="m" x="24" y="337"><tspan fill="var(--muted)" font-weight="700">10 GND</tspan> sync</text>
<text class="m" x="240" y="337"><tspan fill="var(--muted)" font-weight="700">11 NC</tspan> ID0</text>
<text class="m" x="456" y="337"><tspan fill="var(--blue)" font-weight="700">12 DDC-DAT</tspan> BMC B2</text>
<text class="m" x="24" y="352"><tspan fill="var(--blue)" font-weight="700">13 HSYNC</tspan> BMC U2 · QU6</text>
<text class="m" x="240" y="352"><tspan fill="var(--blue)" font-weight="700">14 VSYNC</tspan> BMC R4 · QU6</text>
<text class="m" x="456" y="352"><tspan fill="var(--blue)" font-weight="700">15 DDC-CLK</tspan> BMC B1</text>
</svg>
