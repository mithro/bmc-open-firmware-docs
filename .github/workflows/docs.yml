# Build the Sphinx docs and run the link checker on every push / PR.
# Read the Docs builds the published site separately; this gates the source.
name: docs

on:
  push:        # build the docs on a push to ANY branch, not just main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    # A push to a branch in this repo also fires the pull_request event for
    # its open PR, so the same commit ran twice concurrently — the duplicate
    # linkcheck bursts got 429-throttled (github.com, web.archive.org). Run
    # the pull_request job only for forks, where there is no push run.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build HTML (warnings are errors)
        run: sphinx-build -W --keep-going -b html source _build/html
      - name: Link check
        run: sphinx-build -b linkcheck source _build/linkcheck
      - uses: actions/upload-artifact@v4
        with:
          name: html
          path: _build/html
